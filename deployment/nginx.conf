server {
    listen 80;
    server_name biz.pasindubuddhima.me;

    # Redirect all HTTP requests to HTTPS (Cloudflare will handle this if "Flexible" or "Full" SSL is used, but this is a safeguard)
    # return 301 https://$host$request_uri;

    location / {
        root /var/www/erp_frontend/dist;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to the Spring Boot backend
    location /api/ {
        proxy_pass http://localhost:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
