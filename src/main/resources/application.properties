spring.application.name=erp

# Database (Local MySQL)
spring.datasource.url=jdbc:mysql://localhost:3307/erp_db
spring.datasource.username=root
spring.datasource.password=1234
spring.jpa.generate-ddl=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
#spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# Connection Pooling (Hikari)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=30000

# Maximum file size for single file
spring.servlet.multipart.max-file-size=10MB

# Maximum request size (total for all files)
spring.servlet.multipart.max-request-size=15MB

# Enable multipart uploads
spring.servlet.multipart.enabled=true

# OpenAI API Configuration
openai.api.key=${OPENAI_API_KEY:sk-YOUR_API_KEY_HERE}
openai.api.url=https://api.openai.com/v1/chat/completions